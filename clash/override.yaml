mode: rule
ipv6: false
allow-lan: false
unified-delay: true
tcp-concurrent: true
find-process-mode: always
log-level: warning

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  skip-domain:
    - Mijia Cloud
    - +.push.apple.com

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://1.1.1.1/dns-query#PROXY
    - https://8.8.8.8/dns-query#PROXY
  fallback:
    - https://9.9.9.9/dns-query#PROXY
    - https://1.0.0.1/dns-query#PROXY
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
  fake-ip-filter:
    - +.lan
    - +.local
    - +.localhost
    - +.miwifi.com
    - +.routerlogin.com
    - +.push.apple.com
    - time.*.com
    - time.*.gov
    - time.*.edu.cn
    - time.*.apple.com
    - time-ios.apple.com
    - "*.ntp.org.cn"
    - "*.pool.ntp.org"

proxy-groups:
  - name: PROXY
    type: select
    include-all: true
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|官网|客服|网站|网址|获取|过期|剩余
    proxies:
      - AUTO
      - HK AUTO
      - TW AUTO
      - SG AUTO
      - JP AUTO
      - US AUTO
      - DIRECT

  - name: AUTO
    type: url-test
    include-all: true
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|官网|客服|网站|网址|获取|过期|剩余
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: AIGC
    type: select
    proxies:
      - PROXY
      - US AUTO
      - SG AUTO
      - JP AUTO
      - TW AUTO
      - HK AUTO

  - name: SOCIAL
    type: select
    proxies:
      - PROXY
      - HK AUTO
      - TW AUTO
      - SG AUTO
      - JP AUTO
      - US AUTO

  - name: MEDIA
    type: select
    proxies:
      - PROXY
      - HK AUTO
      - TW AUTO
      - SG AUTO
      - JP AUTO
      - US AUTO

  - name: GOOGLE
    type: select
    proxies:
      - PROXY
      - HK AUTO
      - TW AUTO
      - SG AUTO
      - JP AUTO
      - US AUTO

  - name: MICROSOFT
    type: select
    proxies:
      - PROXY
      - DIRECT
      - HK AUTO
      - TW AUTO
      - SG AUTO
      - JP AUTO
      - US AUTO

  - name: HK AUTO
    type: url-test
    include-all: true
    filter: (?i)香港|Hong Kong|HK|HKG
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|官网|客服|网站|网址|获取|过期|剩余
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: TW AUTO
    type: url-test
    include-all: true
    filter: (?i)台湾|Taiwan|TW|TPE|TSA|KHH
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|官网|客服|网站|网址|获取|过期|剩余
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: SG AUTO
    type: url-test
    include-all: true
    filter: (?i)新加坡|Singapore|SG|SIN
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|官网|客服|网站|网址|获取|过期|剩余
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: JP AUTO
    type: url-test
    include-all: true
    filter: (?i)日本|Japan|JP|NRT|HND|KIX
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|官网|客服|网站|网址|获取|过期|剩余
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: US AUTO
    type: url-test
    include-all: true
    filter: (?i)美国|United States|USA|US|SJC|LAX|SFO|SEA|JFK
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|官网|客服|网站|网址|获取|过期|剩余
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: GLOBAL
    type: select
    include-all: true
    proxies:
      - PROXY
      - AUTO
      - AIGC
      - SOCIAL
      - MEDIA
      - GOOGLE
      - MICROSOFT
      - HK AUTO
      - TW AUTO
      - SG AUTO
      - JP AUTO
      - US AUTO
      - DIRECT

rules:
  - RULE-SET,Advertising,REJECT
  - RULE-SET,Tracking,REJECT
  - AND,((DST-PORT,443),(NETWORK,UDP),(NOT,((GEOIP,CN)))),REJECT
  - RULE-SET,personal_direct,DIRECT
  - RULE-SET,Private,DIRECT
  - RULE-SET,Direct,DIRECT
  - RULE-SET,Download,DIRECT
  - RULE-SET,AppleCN,DIRECT
  - RULE-SET,China,DIRECT
  - RULE-SET,personal_proxy,PROXY
  - RULE-SET,personal_claude,AIGC
  - RULE-SET,AI,AIGC
  - RULE-SET,Claude,AIGC
  - RULE-SET,OpenAI,AIGC
  - RULE-SET,Gemini,AIGC
  - RULE-SET,Telegram,SOCIAL
  - RULE-SET,Twitter,SOCIAL
  - RULE-SET,Instagram,SOCIAL
  - RULE-SET,Facebook,SOCIAL
  - RULE-SET,SocialMedia,SOCIAL
  - RULE-SET,YouTube,MEDIA
  - RULE-SET,Netflix,MEDIA
  - RULE-SET,Disney,MEDIA
  - RULE-SET,HBO,MEDIA
  - RULE-SET,Spotify,MEDIA
  - RULE-SET,Emby,MEDIA
  - RULE-SET,Streaming,MEDIA
  - RULE-SET,Google,GOOGLE
  - RULE-SET,Microsoft,MICROSOFT
  - RULE-SET,OneDrive,MICROSOFT
  - RULE-SET,GitHub,PROXY
  - RULE-SET,Cloudflare,PROXY
  - RULE-SET,Proxy,PROXY
  - RULE-SET,AdvertisingIP,REJECT,no-resolve
  - RULE-SET,PrivateIP,DIRECT,no-resolve
  - RULE-SET,AIIP,AIGC,no-resolve
  - RULE-SET,TelegramIP,SOCIAL,no-resolve
  - RULE-SET,SocialMediaIP,SOCIAL,no-resolve
  - RULE-SET,FacebookIP,SOCIAL,no-resolve
  - RULE-SET,StreamingIP,MEDIA,no-resolve
  - RULE-SET,NetflixIP,MEDIA,no-resolve
  - RULE-SET,EmbyIP,MEDIA,no-resolve
  - RULE-SET,GoogleIP,GOOGLE,no-resolve
  - RULE-SET,CloudflareIP,PROXY,no-resolve
  - RULE-SET,ProxyIP,PROXY,no-resolve
  - RULE-SET,ChinaIP,DIRECT,no-resolve
  - MATCH,PROXY

