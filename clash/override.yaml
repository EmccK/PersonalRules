mode: rule
ipv6: false
allow-lan: false
unified-delay: true
tcp-concurrent: true
find-process-mode: always
log-level: warning

geodata-mode: false
geox-url:
  geoip: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  mmdb: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb
  asn: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb

profile:
  store-selected: true
  store-fake-ip: true

experimental:
  quic-go-disable-gso: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  skip-domain:
    - Mijia Cloud
    - +.push.apple.com

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://1.1.1.1/dns-query#一键连
    - https://8.8.8.8/dns-query#一键连
  fallback:
    - https://9.9.9.9/dns-query#一键连
    - https://1.0.0.1/dns-query#一键连
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
  fake-ip-filter:
    - rule-set:Direct
    - rule-set:Private
    - rule-set:China
    - +.lan
    - +.local
    - +.localhost
    - +.miwifi.com
    - +.routerlogin.com
    - +.push.apple.com
    - "*.ntp.org.cn"
    - "*.pool.ntp.org"

proxy-groups:
  - name: 一键连
    type: select
    proxies:
      - 故障转移
      - 香港自动
      - 台湾自动
      - 日本自动
      - 狮城自动
      - 韩国自动
      - 美国自动
      - 欧洲自动
      - 手动选择
      - DIRECT

  - name: 人工智能
    type: select
    proxies:
      - 美国自动
      - 一键连
      - 日本自动
      - 狮城自动
      - 台湾自动
      - 香港自动
      - 手动选择

  - name: 社交平台
    type: select
    proxies:
      - 一键连
      - 香港自动
      - 台湾自动
      - 日本自动
      - 狮城自动
      - 美国自动
      - 手动选择

  - name: 国际媒体
    type: select
    proxies:
      - 一键连
      - 香港自动
      - 台湾自动
      - 日本自动
      - 狮城自动
      - 美国自动
      - 手动选择

  - name: 国内流量
    type: select
    proxies:
      - DIRECT
      - 一键连
      - 香港自动
      - 台湾自动
      - 日本自动
      - 狮城自动
      - 美国自动
      - 手动选择

  - name: 手动选择
    type: select
    include-all: true
    filter: ^(?!.*(DIRECT|直接连接|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author)).*

  - name: 故障转移
    type: fallback
    hidden: true
    url: https://www.gstatic.com/generate_204
    interval: 300
    lazy: true
    proxies:
      - 香港自动
      - 台湾自动
      - 日本自动
      - 狮城自动
      - 韩国自动
      - 美国自动
      - 欧洲自动
      - 手动选择
      - DIRECT

  - name: 香港自动
    type: url-test
    hidden: true
    include-all: true
    filter: (?i)香港|Hong Kong|HK|HKG
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|官网|客服|网站|网址|获取|过期|剩余
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 台湾自动
    type: url-test
    hidden: true
    include-all: true
    filter: (?i)台湾|Taiwan|TW|TPE|TSA|KHH
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|官网|客服|网站|网址|获取|过期|剩余
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 日本自动
    type: url-test
    hidden: true
    include-all: true
    filter: (?i)日本|Japan|JP|NRT|HND|KIX
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|官网|客服|网站|网址|获取|过期|剩余
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 狮城自动
    type: url-test
    hidden: true
    include-all: true
    filter: (?i)新加坡|Singapore|SG|SIN
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|官网|客服|网站|网址|获取|过期|剩余
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 韩国自动
    type: url-test
    hidden: true
    include-all: true
    filter: (?i)韩国|Korea|KR|KOR|ICN
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|官网|客服|网站|网址|获取|过期|剩余
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 美国自动
    type: url-test
    hidden: true
    include-all: true
    filter: (?i)美国|United States|USA|US|SJC|LAX|SFO|SEA|JFK
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|官网|客服|网站|网址|获取|过期|剩余
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 欧洲自动
    type: url-test
    hidden: true
    include-all: true
    filter: (?i)英国|法国|德国|荷兰|欧洲|Europe|UK|GB|FR|DE|NL|EU|LHR|FRA|AMS|CDG
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|官网|客服|网站|网址|获取|过期|剩余
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

rules:
  - AND,((DST-PORT,443),(NETWORK,UDP),(NOT,((GEOIP,CN)))),REJECT
  - RULE-SET,personal_direct,DIRECT
  - RULE-SET,Private,DIRECT
  - RULE-SET,Direct,DIRECT
  - RULE-SET,AppleCN,DIRECT
  - RULE-SET,Download,DIRECT
  - RULE-SET,XPTV,DIRECT
  - RULE-SET,China,国内流量
  - RULE-SET,personal_proxy,一键连
  - RULE-SET,personal_claude,人工智能
  - RULE-SET,AI,人工智能
  - RULE-SET,Telegram,社交平台
  - RULE-SET,SocialMedia,社交平台
  - RULE-SET,YouTube,国际媒体
  - RULE-SET,Spotify,国际媒体
  - RULE-SET,Netflix,国际媒体
  - RULE-SET,Disney,国际媒体
  - RULE-SET,HBO,国际媒体
  - RULE-SET,Proxy,一键连
  - RULE-SET,PrivateIP,DIRECT,no-resolve
  - RULE-SET,TelegramIP,社交平台,no-resolve
  - RULE-SET,SocialMediaIP,社交平台,no-resolve
  - RULE-SET,NetflixIP,国际媒体,no-resolve
  - RULE-SET,ProxyIP,一键连,no-resolve
  - RULE-SET,ChinaIP,国内流量,no-resolve
  - MATCH,一键连

